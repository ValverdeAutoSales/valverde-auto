<p-carousel [value]="slides()" [numVisible]="1" [numScroll]="1"
            [circular]="true" [autoplayInterval]="6000"
            [showIndicators]="true" [showNavigators]="true">
  <ng-template let-slide #item>
    <div class="relative h-[420px] w-full overflow-hidden md:h-[520px]">
      <img [src]="slide.image" [alt]="slide.title"
           class="absolute inset-0 h-full w-full object-cover" />
      <div class="absolute inset-0 bg-gradient-to-r from-rose-950/70 via-rose-900/40 to-transparent"></div>
      <div class="relative z-10 mx-auto flex h-full max-w-7xl flex-col items-start justify-center gap-4 px-6 md:px-10">
        <h1 class="max-w-xl text-3xl font-bold leading-tight text-white drop-shadow md:text-5xl">
          {{ slide.title }}
        </h1>
        <p class="max-w-md text-base text-rose-50/90 md:text-lg">{{ slide.subtitle }}</p>
        <a routerLink="/catalogo">
          <p-button [label]="slide.cta" icon="pi pi-arrow-right" iconPos="right" size="large" styleClass="custom-hero-button"/>
        </a>
      </div>
    </div>
  </ng-template>
</p-carousel>
