name: Deploy → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'

      - name: ✅ Verificar Node.js
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          if [[ $(node --version) != v22* ]]; then
            echo "❌ ERROR: Necesitamos Node 22"
            exit 1
          fi

      - name: 📦 Instalar dependencias
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build Angular
        run: npx ng build --configuration production --base-href /valverde-auto/
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: 📂 Verificar build
        run: |
          if [ -d "dist/valverde-auto" ]; then
            echo "✅ Build exitoso"
            ls -la dist/valverde-auto/
          else
            echo "❌ Error: No se generó dist/"
            exit 1
          fi

      - name: 📄 Crear 404.html
        run: |
          if [ -f "dist/valverde-auto/browser/index.html" ]; then
            cp dist/valverde-auto/browser/index.html dist/valverde-auto/browser/404.html
          elif [ -f "dist/valverde-auto/index.html" ]; then
            cp dist/valverde-auto/index.html dist/valverde-auto/404.html
          else
            echo "❌ No se encontró index.html"
            exit 1
          fi

      - name: 📤 Subir artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/valverde-auto

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4