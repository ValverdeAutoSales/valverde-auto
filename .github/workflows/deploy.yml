name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Angular
        run: npx ng build --configuration production --base-href /valverde-auto/
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ✅ NUEVO PASO: Crear 404.html para SPA
      - name: Create 404.html for SPA routing
        run: |
          echo '<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Valverde Auto Sales</title>
            <base href="/valverde-auto/">
            <meta name="viewport" content="width=device-width, initial-scale=1">
          </head>
          <body>
            <script>
              // Redirige todas las rutas a index.html
              window.location.href = "/valverde-auto/index.html?path=" + window.location.pathname;
            </script>
          </body>
          </html>' > dist/valverde-auto/browser/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/valverde-auto/browser
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy: Actualización automática desde main'