name: Deploy → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build production
        run: npx ng build --configuration production --base-href /valverde-auto/
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: SPA 404 fix
        run: cp dist/valverde-auto-sales/browser/index.html dist/valverde-auto-sales/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/valverde-auto-sales/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
