name: Deploy → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'  # ← CAMBIADO DE 20 A 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🔍 Verificar estructura del proyecto
        run: |
          echo "📁 Archivos en raíz:"
          ls -la
          echo "📄 angular.json existe? $(test -f angular.json && echo 'SÍ' || echo 'NO')"
          echo "📄 package.json existe? $(test -f package.json && echo 'SÍ' || echo 'NO')"

      - name: 🏗️ Intentar build con logs completos
        run: |
          npx ng build --configuration production --base-href /valverde-auto/ 2>&1 | tee build.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "Código de salida: $EXIT_CODE"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ El build falló. Errores:"
            grep -i "error" build.log | head -20
            exit 1
          fi
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: 📂 Verificar dist generado
        run: |
          if [ -d "dist" ]; then
            echo "✅ dist existe!"
            echo "Estructura:"
            ls -R dist/ | head -50
          else
            echo "❌ dist NO se generó. Contenido de build.log:"
            cat build.log
            exit 1
          fi

      - name: SPA 404 fix
        run: |
          # Buscar index.html en cualquier lugar
          INDEX=$(find dist/ -name "index.html" | head -1)
          if [ -n "$INDEX" ]; then
            DIR=$(dirname "$INDEX")
            cp "$INDEX" "$DIR/404.html"
            echo "✅ 404.html creado en $DIR"
          else
            echo "❌ No se encontró index.html"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: $(find dist/ -name "index.html" | head -1 | xargs dirname)

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4