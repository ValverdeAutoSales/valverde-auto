name: Deploy → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Build production
        run: npx ng build --configuration production --base-href /valverde-auto/
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Verificar estructura de dist
        run: |
          echo "Contenido de dist:"
          ls -la dist/
          echo "Buscando browser:"
          find dist/ -name "browser" -type d

      - name: SPA 404 fix (automático)
        run: |
          BUILD_DIR=$(find dist/ -name "browser" -type d | head -1)
          echo "Directorio de build: $BUILD_DIR"
          cp $BUILD_DIR/index.html $BUILD_DIR/404.html
          echo "404.html creado en: $BUILD_DIR/404.html"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: $(find dist/ -name "browser" -type d | head -1)

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4